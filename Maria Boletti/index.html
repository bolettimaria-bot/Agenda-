<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Agenda de Contatos</h1>

        <div class="search-section">
            <input type="text" id="filterInput" placeholder="Filtrar contatos..." onkeyup="filterContacts()">
        </div>

        <div class="input-section">
            <input type="text" id="name" placeholder="Nome">
            <input type="email" id="email" placeholder="E-mail">
            <input type="text" id="phone" placeholder="Telefone">
            <button onclick="saveContact()" id="saveBtn">Cadastrar</button>
        </div>

        <div class="total-section">
            Total de Contatos: <span id="totalCount">0</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="contactTableBody">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
